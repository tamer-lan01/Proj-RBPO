spring.application.name=proj
spring.datasource.url=jdbc:postgresql://localhost:5432/proj
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.sql.init.platform=postgresql

# Admin register: send header X-Admin-Register-Secret; set APP_ADMIN_REGISTER_SECRET in production.
app.security.admin-register-secret=${APP_ADMIN_REGISTER_SECRET:vetclinic-dev-admin-secret}